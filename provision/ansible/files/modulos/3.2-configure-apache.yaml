---
- name: Remove o arquivo index.html
  when:
    - ansible_os_family == "Debian"
    - php_packages_ubuntu_installed is succeeded
  ansible.builtin.file:
    path: /var/www/html/index.html
    state: absent
- name: Define o arquivo de configuração para testar suporte PHP em Distribuições Debian/Ubuntu
  when:
    - ansible_os_family == "Debian"
    - php_packages_ubuntu_installed is succeeded
  ansible.builtin.copy:
    src: /home/suporte/modulos/files/web/index.php
    dest: /var/www/html/index.php
    owner: www-data
    group: www-data
    mode: "0644"
- name: Define o arquivo de configuração para testar o suporte PHP em Distribuições RedHat/Rocky Linux
  when:
    - ansible_os_family == "RedHat"
    - php_packages_rocky_installed is succeeded
  ansible.builtin.copy:
    src: /home/suporte/modulos/files/web/index.php
    dest: /var/www/html/index.php
    owner: apache
    group: apache
    mode: "0644"
- name: Configura o arquivo índice PHP
  when:
    - ansible_os_family == "RedHat"
    - php_packages_rocky_installed
  ansible.builtin.replace:
    path: /etc/httpd/conf/httpd.conf
    # DirectoryIndex index.html
    regexp: '(DirectoryIndex)\s(index.)(html)'
    replace: '\1 \2php'
  notify: 'Restart Httpd'