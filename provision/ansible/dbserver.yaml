---
- hosts: dbserver
  become: yes
  become_user: root
  become_method: sudo
  vars_files:
    - vars/hosts.yaml
  tasks:
    - name: Garantindo /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
      with_items:
        - 172.16.0.199 ansible
        - 172.16.0.200 balancer
        - 172.16.0.201 webserver1
        - 172.16.0.202 webserver2
        - 172.16.0.203 dbserver
        - 172.16.0.204 winclient

    - name: Ajustando /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: 127.0.1.1 dbserver
        state: absent

    - name: Desabilita o uso de IPv6 no host
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/60-disable-ipv6.conf
        line: '{{ item }}'
        state: present
        create: true
      with_items:
        - net.ipv6.conf.all.disable_ipv6 = 1
        - net.ipv6.conf.default.disable_ipv6 = 1
        - net.ipv6.conf.lo.disable_ipv6 = 1
      notify:
        - 'Reload sysctl'
  handlers:
    - name: 'Reload sysctl'
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/60-disable-ipv6.conf
