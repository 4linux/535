---
- name: Configura nó de controle do Ansible
  gather_facts: false
  hosts:
    - ansible
  become: yes
  become_user: root
  become_method: sudo
  vars_files:
    - vars/hosts.yaml
  tasks:
    - name: Garantindo /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
      with_items: '{{ linux_hosts_file }}'

    - name: Ajustando /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: 127.0.1.1 ansible
        state: absent

    - name: Adiciona usuário suporte
      ansible.builtin.user:
        name: suporte
        state: present
        shell: /bin/bash
        password: '$1$gGnGcYuu$nfGgkuOm8xRp9vvL8rmIM/'

    - name: Garantir permissão de root para o usuário suporte
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        state: present
        insertafter: 'vagrant ALL=(ALL) NOPASSWD: ALL'
        line: 'suporte ALL=(ALL) NOPASSWD: ALL'

    - name: Configurando o OpenSSH do usuário suporte
      ansible.builtin.file:
        path: /home/suporte/.ssh
        state: directory
        mode: '0700'
        owner: suporte
        group: suporte

    - name: Configurando o cache de fatos do Ansible
      ansible.builtin.file:
        path: /home/suporte/.ansible/cache/facts
        state: directory
        mode: '0700'

    - name: Configurando os logs do Ansible
      ansible.builtin.file:
        path: /home/suporte/.ansible/logs
        state: directory
        mode: '0700'

    - name: Criando diretório lookup
      ansible.posix.synchronize:
        src: files/lookup
        dest: /home/suporte

    - name: Criando diretório modulos
      ansible.posix.synchronize:
        src: files/modulos
        dest: /home/suporte

    - name: Criando diretório molecule
      ansible.posix.synchronize:
        src: files/molecule
        dest: /home/suporte

    - name: Criando diretório playbooks
      ansible.posix.synchronize:
        src: files/playbooks
        dest: /home/suporte

    - name: Criando diretório roles
      ansible.posix.synchronize:
        src: files/roles
        dest: /home/suporte

    - name: Criando diretório site
      ansible.posix.synchronize:
        src: files/site
        dest: /home/suporte

    - name: Criando diretório awx
      ansible.posix.synchronize:
        src: files/awx
        dest: /home/suporte

    - name: Desabilita o uso de IPv6 no host
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/60-disable-ipv6.conf
        line: '{{ item }}'
        state: present
        create: true
      with_items:
        - net.ipv6.conf.all.disable_ipv6 = 1
        - net.ipv6.conf.default.disable_ipv6 = 1
        - net.ipv6.conf.lo.disable_ipv6 = 1
      notify:
        - 'Reload sysctl'
  handlers:
    - name: 'Reload sysctl'
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/60-disable-ipv6.conf